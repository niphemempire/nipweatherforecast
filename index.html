<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

// Your Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyCpICikCx_YxbOSyHrnDFY6mh5imiavJCE",
    authDomain: "fir-learn-8075a.firebaseapp.com",
    projectId: "fir-learn-8075a",
    storageBucket: "fir-learn-8075a.firebasestorage.app",
    messagingSenderId: "814037799575",
    appId: "1:814037799575:web:7a95a5dc4ce0e8cebecfd2"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Logout button
const logoutBtn = document.getElementById('logoutBtn');
logoutBtn.addEventListener('click', async () => {
    try {
        await signOut(auth);
        alert('Logged out successfully!');
        window.location.href = './Others/login.html'; // redirect to login page
    } catch (error) {
        console.error(error);
        alert('Error logging out: ' + error.message);
    }
});

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = './Others/login.html';
  } else {
    console.log("User is logged in", user);
  }
});
</script>
